<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Odin Vault</title>
  <link rel="stylesheet" href="/styles.css">
  <style>
    body {
      min-height: 100vh;
    }

    .vault-shell {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 24px 0;
    }

    .vault-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    .vault-title {
      font-size: 1.25rem;
      font-weight: 600;
    }

    .vault-meta {
      color: var(--text-secondary);
      font-size: 0.875rem;
      overflow-wrap: anywhere;
    }

    .vault-links {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .vault-grid {
      display: grid;
      grid-template-columns: minmax(260px, 340px) 1fr;
      gap: 16px;
      min-height: calc(100vh - 120px);
    }

    .vault-pane {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      min-width: 0;
      overflow: hidden;
      box-shadow: var(--shadow-card);
    }

    .vault-sidebar {
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .vault-search {
      padding: 12px;
      border-bottom: 1px solid var(--border);
    }

    .vault-tree {
      overflow: auto;
      padding: 8px;
    }

    .vault-entry {
      width: 100%;
      border: 0;
      background: transparent;
      color: var(--text-mid);
      display: grid;
      grid-template-columns: 18px 1fr;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      border-radius: 0.5rem;
      padding: 6px 8px;
      text-align: left;
      font-family: var(--font-sans);
      font-size: 0.875rem;
      cursor: pointer;
    }

    .vault-entry:hover,
    .vault-entry.active {
      background: var(--bg-hover);
      color: var(--text);
    }

    .vault-entry[disabled] {
      cursor: default;
      color: var(--text-secondary);
    }

    .vault-entry[disabled]:hover {
      background: transparent;
    }

    .vault-entry-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .vault-content-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }

    .vault-file-title {
      min-width: 0;
      font-weight: 600;
      overflow-wrap: anywhere;
    }

    .vault-file-meta {
      color: var(--text-secondary);
      font-size: 0.75rem;
      white-space: nowrap;
    }

    .vault-document {
      padding: 16px;
      overflow: auto;
      height: calc(100vh - 190px);
    }

    .vault-document pre {
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
      font-size: 0.875rem;
      line-height: 1.65;
      color: var(--text-mid);
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .vault-empty {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      text-align: center;
      padding: 32px;
    }

    @media (max-width: 820px) {
      .vault-header {
        align-items: flex-start;
        flex-direction: column;
      }

      .vault-links {
        justify-content: flex-start;
      }

      .vault-grid {
        grid-template-columns: 1fr;
        min-height: auto;
      }

      .vault-tree {
        max-height: 42vh;
      }

      .vault-document {
        height: 52vh;
      }
    }
  </style>
</head>
<body>
  <main class="vault-shell">
    <header class="vault-header">
      <div>
        <h1 class="vault-title">Odin Vault</h1>
        <p class="vault-meta" id="vaultMeta">Loading...</p>
      </div>
      <nav class="vault-links" aria-label="Odin navigation">
        <a class="btn btn-secondary" href="/setup">Setup</a>
        <a class="btn btn-secondary" href="/logs">Logs</a>
      </nav>
    </header>

    <section class="vault-grid" aria-label="Vault browser">
      <aside class="vault-pane vault-sidebar">
        <div class="vault-search">
          <label class="label" for="search">Filter</label>
          <input class="input" id="search" type="search" placeholder="memory, soul, agents">
        </div>
        <div class="vault-tree" id="tree" aria-live="polite"></div>
      </aside>

      <article class="vault-pane">
        <div class="vault-content-header">
          <div class="vault-file-title" id="fileTitle">Select a file</div>
          <div class="vault-file-meta" id="fileMeta"></div>
        </div>
        <div class="vault-document">
          <pre id="content">Loading vault...</pre>
        </div>
      </article>
    </section>
  </main>

  <script>
    const state = {
      items: [],
      selectedPath: '',
      filter: '',
    };

    const treeEl = document.getElementById('tree');
    const contentEl = document.getElementById('content');
    const fileTitleEl = document.getElementById('fileTitle');
    const fileMetaEl = document.getElementById('fileMeta');
    const vaultMetaEl = document.getElementById('vaultMeta');
    const searchEl = document.getElementById('search');

    function formatBytes(bytes) {
      if (!Number.isFinite(bytes)) return '';
      if (bytes < 1024) return `${bytes} B`;
      if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
      return `${(bytes / 1024 / 1024).toFixed(1)} MB`;
    }

    function renderTree() {
      treeEl.textContent = '';
      const filter = state.filter.trim().toLowerCase();
      const items = state.items.filter((item) => {
        if (!filter) return true;
        return item.path.toLowerCase().includes(filter);
      });

      if (!items.length) {
        const empty = document.createElement('div');
        empty.className = 'vault-empty';
        empty.textContent = 'No matching files.';
        treeEl.appendChild(empty);
        return;
      }

      for (const item of items) {
        const row = document.createElement('button');
        row.className = 'vault-entry';
        row.style.paddingLeft = `${8 + item.depth * 14}px`;
        row.disabled = item.type !== 'file' || !item.readable;
        row.title = item.path;
        if (item.path === state.selectedPath) row.classList.add('active');

        const icon = document.createElement('span');
        icon.textContent = item.type === 'directory' ? '/' : '#';

        const name = document.createElement('span');
        name.className = 'vault-entry-name';
        name.textContent = item.name;

        row.append(icon, name);
        if (item.type === 'file' && item.readable) {
          row.addEventListener('click', () => openFile(item.path));
        }
        treeEl.appendChild(row);
      }
    }

    async function openFile(path) {
      state.selectedPath = path;
      renderTree();
      fileTitleEl.textContent = path;
      fileMetaEl.textContent = '';
      contentEl.textContent = 'Loading...';

      try {
        const res = await fetch(`/setup/api/vault/file?path=${encodeURIComponent(path)}`, {
          credentials: 'same-origin',
        });
        const data = await res.json();
        if (!res.ok || !data.ok) throw new Error(data.error || 'Unable to load file.');
        fileTitleEl.textContent = data.path;
        fileMetaEl.textContent = formatBytes(data.size);
        contentEl.textContent = data.content || '';
      } catch (err) {
        contentEl.textContent = err.message;
      }
    }

    async function loadVault() {
      try {
        const res = await fetch('/setup/api/vault/tree', { credentials: 'same-origin' });
        const data = await res.json();
        if (!res.ok || !data.ok) throw new Error(data.error || 'Unable to load vault.');

        state.items = data.items || [];
        const readableFiles = state.items.filter((item) => item.type === 'file' && item.readable);
        vaultMetaEl.textContent = `${readableFiles.length} readable files in ${data.root}${data.truncated ? ' (truncated)' : ''}`;
        renderTree();

        const preferred = readableFiles.find((item) => item.path === 'MEMORY.md')
          || readableFiles.find((item) => item.path.toLowerCase().endsWith('/soul.md'))
          || readableFiles[0];
        if (preferred) {
          await openFile(preferred.path);
        } else {
          fileTitleEl.textContent = 'No readable files';
          contentEl.textContent = '';
        }
      } catch (err) {
        vaultMetaEl.textContent = 'Unavailable';
        contentEl.textContent = err.message;
      }
    }

    searchEl.addEventListener('input', () => {
      state.filter = searchEl.value;
      renderTree();
    });

    loadVault();
  </script>
</body>
</html>
